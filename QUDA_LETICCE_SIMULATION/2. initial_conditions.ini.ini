# initial_conditions.ini
[Cosmology]
h = 0.674
Omega_m = 0.315
Omega_b = 0.049
Omega_r = 8.6e-5
Omega_Lambda = 0.685
T_CMB = 2.7255
sigma_8 = 0.811
n_s = 0.965

[HiggsField]
v_EW = 246.0              # GeV, Higgs vacuum expectation value
lambda_higgs = 0.129      # Higgs self-coupling
gamma_dissipative = 0.15  # Dissipative coupling parameter
r_H_scale = 1.0           # kpc, characteristic Higgs scale
initial_amplitude = 1.0   # Initial field amplitude normalization

[SimulationParameters]
box_size = 100.0          # Mpc/h
grid_size = 256
redshift_initial = 100.0
redshift_final = 0.0
time_step = 0.01          # In terms of scale factor
output_redshifts = 100.0, 50.0, 10.0, 5.0, 2.0, 1.0, 0.5, 0.0

[InitialPerturbations]
random_seed = 12345
power_spectrum_type = Eisenstein-Hu
non_linear = False
baryons_include = True

[Output]
format = HDF5
fields_output = metric, higgs_field, energy_density, pressure
analysis_times = 0.1, 0.5, 1.0